# ─────────────────────────────────────────────────
# IoT Sentinel — Docker Compose (hackathon-ready)
# ─────────────────────────────────────────────────
version: "3.9"

services:
  # ── FastAPI API Server ──────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: iot_sentinel_api
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-hackathon-secret}
      - PORT=8000
      - HOST=0.0.0.0
      - RELOAD=false
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/health'); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Streamlit Dashboard ─────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: iot_sentinel_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - WS_URL=ws://api:8000/ws
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8501/_stcore/health'); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
